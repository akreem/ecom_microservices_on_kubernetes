apiVersion: v1
kind: Service
metadata:
  name: store
  namespace: microstore
  labels:
    app.kubernetes.io/name: store
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: microstore
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: store
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
