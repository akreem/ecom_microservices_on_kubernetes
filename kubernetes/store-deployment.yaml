apiVersion: apps/v1
kind: Deployment
metadata:
  name: store
  namespace: microstore
  labels:
    app.kubernetes.io/name: store
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: microstore
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: store
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: store
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: microstore
    spec:
      containers:
        - name: store
          image: akreem/micro_store:v1.7
          imagePullPolicy: IfNotPresent
          command: ["gunicorn", "store.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "3"]
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
