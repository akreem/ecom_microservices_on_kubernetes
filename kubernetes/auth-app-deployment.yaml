apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-app
  namespace: microstore
  labels:
    app.kubernetes.io/name: auth-app
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: microstore
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-app
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-app
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: microstore
    spec:
      containers:
        - name: auth-app
          image: akreem/micro_auth_app:v1.2
          imagePullPolicy: IfNotPresent
          command: ["gunicorn", "auth.wsgi:application", "--bind", "0.0.0.0:8001", "--workers", "2"]
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
